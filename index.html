  {id:"p16",emoji:"🔁",title:"Transformar em adição",focus:"Só no final: reescrever subtração como adição do oposto.",minimumStable:2,

function loadState(){ try{const raw=localStorage.getItem(KEY); if(raw) return JSON.parse(raw);}catch(e){} return {current:0,phaseStats:{},reports:[]}; }
function saveState(s){ localStorage.setItem(KEY, JSON.stringify(s)); }
let state = loadState();
function phaseData(id){ if(!state.phaseStats[id]) state.phaseStats[id]={attempts:[],unlocked:false,stable:false}; return state.phaseStats[id]; }
phaseData(PHASES[0].id).unlocked=true;
function isUnlocked(index){ return !!phaseData(PHASES[index].id).unlocked; }
function starsFor(index){ const ph=PHASES[index], pd=phaseData(ph.id); return Math.min(pd.attempts.filter(a=>a.stable).length, ph.minimumStable); }

let ui={screen:"home",phaseIndex:0,stepType:"teach",teachIndex:0,qIndex:0,selected:null,answered:false,microSelected:null,round:[]};

function percent(n,min,max){ return ((n-min)/(max-min))*100; }
function roadHTML(cfg){
  const min=cfg.min??-6, max=cfg.max??6; let nums=[]; for(let i=min;i<=max;i++) nums.push(i);
  const point=cfg.point??null, start=cfg.start??null, end=cfg.end??null, dist=!!cfg.dist;
  const current=point??end??start??0;
  let moveBar=''; if(start!==null&&end!==null){ const left=Math.min(percent(start,min,max),percent(end,min,max)), width=Math.abs(percent(end,min,max)-percent(start,min,max)); moveBar=`<div style="position:absolute;left:${left}%;width:${width}%;top:-1px;height:7px;border-radius:999px;background:${end>=start?'rgba(34,197,94,.35)':'rgba(239,68,68,.35)'}"></div>`; }
  let distBar=''; if(dist&&point!==null){ const left=Math.min(percent(0,min,max),percent(point,min,max)), width=Math.abs(percent(point,min,max)-percent(0,min,max)), mid=(percent(0,min,max)+percent(point,min,max))/2; distBar=`<div class="dist" style="left:${left}%;width:${width}%"></div><div class="distTag" style="left:${mid}%">${Math.abs(point)} passos</div>`; }
  return `<div class="road fade"><div class="line">${moveBar}${distBar}${nums.map(n=>`<div class="tick ${n===0?'zero':''}" style="left:${percent(n,min,max)}%"></div><div class="label ${n===0?'zero':''}" style="left:${percent(n,min,max)}%">${n>0?`+${n}`:n}</div>`).join('')}<div class="ninja" style="left:${percent(current,min,max)}%">🥷</div><div class="bubble" style="left:${percent(current,min,max)}%">${current>0?`+${current}`:current}</div></div></div>`;
}
function phaseHeader(ph, phaseIndex){
  const stable=starsFor(phaseIndex);
  return `<div class="top"><div class="row" style="justify-content:space-between"><button class="btn2" onclick="goHome()" style="padding:10px 12px;font-size:15px">← Menu</button><div class="center"><div class="sub">Fase ${phaseIndex+1}</div><div style="font-size:18px;font-weight:900">${ph.emoji} ${ph.title}</div></div><button class="help" onclick="askMom(false)" style="padding:10px 12px;font-size:15px">❤️ Mãe</button></div><div style="margin-top:10px" class="stars">${"⭐".repeat(stable)}${"☆".repeat(Math.max(0,ph.minimumStable-stable))}</div></div>`;
}
function renderHome(){
  document.getElementById('app').innerHTML=`<div class="app"><div class="top"><div class="hero">🥷</div><div class="sub center">Modo campanha • inteiros • chicago</div><div class="title center">Missão Matemática do Pedro</div></div><div class="wrap">${PHASES.map((ph,i)=>{const unlocked=isUnlocked(i), st=starsFor(i); return `<button class="phase ${unlocked?'':'lock'}" ${unlocked?`onclick="startPhase(${i})"`:''}><div class="num">${i+1}</div><div style="flex:1;text-align:left"><div style="font-size:20px;font-weight:900">${ph.emoji} ${ph.title}</div><div class="small">${ph.focus}</div><div class="stars">${"⭐".repeat(st)}${"☆".repeat(Math.max(0,ph.minimumStable-st))}</div></div><div style="font-size:22px;opacity:.7">${unlocked?'›':'🔒'}</div></button>`}).join('')}<div class="card"><div class="kicker">O que mudou na v6</div><div class="mid">As fases mais pesadas foram quebradas em partes menores e mais lentas.</div><div style="height:10px"></div><button class="help" onclick="askMom(true)">Enviar resumo para a mãe</button></div><div class="footerSpace"></div></div></div>`;
}
function startPhase(i){ ui={screen:"phase",phaseIndex:i,stepType:"teach",teachIndex:0,qIndex:0,selected:null,answered:false,microSelected:null,round:[]}; renderPhase(); }
function goHome(){ saveState(state); renderHome(); }
function renderTeach(item){
  if(item.type==="hero") return `<div class="card fade"><div class="hero">${item.emoji}</div><div class="kicker">Aprender</div><div class="big">${item.title}</div><div style="height:8px"></div><div class="mid">${item.text}</div></div>`;
  if(item.type==="tip") return `<div class="tip fade">${item.text}</div>`;
  if(item.type==="warn") return `<div class="warn fade">${item.text}</div>`;
  if(item.type==="hint") return `<div class="hint fade">${item.text}</div>`;
  if(item.type==="road"||item.type==="roadDist"||item.type==="roadMove"){
    const tit=item.type==="road"?"Veja a posição":item.type==="roadDist"?"Veja a distância até o zero":"Veja o movimento";
    return `<div class="card fade"><div class="kicker">${tit}</div>${roadHTML(item)}</div>`;
  }
  if(item.type==="micro"||item.type==="micro3"){
    const cls=item.type==="micro3"?'micro3':'micro';
    return `<div class="card fade"><div class="kicker">Mini treino sem pressão</div><div class="mid">${item.prompt}</div><div style="height:10px"></div><div class="${cls}">${item.buttons.map((b,idx)=>{const chosen=ui.microSelected===idx, okCls=chosen&&b.ok?'ok':chosen&&!b.ok?'bad':'', ghost=ui.microSelected!==null&&ui.microSelected!==idx?'ghost':''; return `<button class="opt ${okCls} ${ghost}" onclick="answerMicro(${idx})">${b.label}</button>`;}).join('')}</div>${ui.microSelected!==null?`<div style="height:10px"></div><div class="${item.buttons[ui.microSelected].ok?'hint':'warn'}">${item.buttons[ui.microSelected].why}</div>`:''}</div>`;
  }
  return '';
}
function nextTeach(){ const ph=PHASES[ui.phaseIndex]; if(ui.teachIndex<ph.teach.length-1){ ui.teachIndex++; ui.microSelected=null; } else { ui.stepType="quiz"; ui.qIndex=0; ui.selected=null; ui.answered=false; } renderPhase(); }
function answerMicro(idx){ ui.microSelected=idx; renderPhase(); }
function answerQ(idx){ const ph=PHASES[ui.phaseIndex], q=ph.questions[ui.qIndex]; if(ui.answered) return; ui.selected=idx; ui.answered=true; const correct=idx===q.correct; const kind=correct?'ok':(q.wrongType&&q.wrongType[0])||'erro'; ui.round.push({q:q.ask,ctx:q.ctx,result:correct?'ok':'error',errorKind:kind}); renderPhase(); }
function nextQuestion(){ const ph=PHASES[ui.phaseIndex]; if(ui.qIndex<ph.questions.length-1){ ui.qIndex++; ui.selected=null; ui.answered=false; } else finishRound(); renderPhase(); }
function roundStability(round){ const total=round.length, errors=round.filter(r=>r.result==='error').length; return errors===0 || (total>=2 && errors<=1); }
function finishRound(){ const ph=PHASES[ui.phaseIndex], pd=phaseData(ph.id); const summary={when:new Date().toLocaleString('pt-BR'),ok:ui.round.filter(x=>x.result==='ok').length,errors:ui.round.filter(x=>x.result==='error').length,stable:roundStability(ui.round),items:ui.round}; pd.attempts.push(summary); pd.stable=pd.attempts.filter(a=>a.stable).length>=ph.minimumStable; if(pd.stable && ui.phaseIndex<PHASES.length-1) phaseData(PHASES[ui.phaseIndex+1].id).unlocked=true; state.reports.push({phase:ph.title,summary}); saveState(state); ui.screen="result"; }
function renderResult(){
  const ph=PHASES[ui.phaseIndex], pd=phaseData(ph.id), last=pd.attempts[pd.attempts.length-1], stableCount=pd.attempts.filter(a=>a.stable).length, unlockedNext=pd.stable&&ui.phaseIndex<PHASES.length-1;
  document.getElementById('app').innerHTML=`<div class="app">${phaseHeader(ph,ui.phaseIndex)}<div class="wrap"><div class="card center"><div class="hero">${last.stable?'🏁':'🔁'}</div><div class="big">${last.stable?'Rodada estável':'Rodada ainda instável'}</div><div class="small" style="margin-top:8px">Esta fase precisa de ${ph.minimumStable} rodadas estáveis. Você já tem ${stableCount}.</div><div style="height:12px"></div><div class="grid2"><div class="card" style="padding:12px"><div class="sub">Acertos</div><div style="font-size:34px;font-weight:900;color:#86efac">${last.ok}</div></div><div class="card" style="padding:12px"><div class="sub">Erros</div><div style="font-size:34px;font-weight:900;color:#fca5a5">${last.errors}</div></div></div></div><div class="card"><div class="kicker">Leitura pedagógica</div><div class="mid">${last.stable?'Ele sustentou esta fase sem grande colapso. Pode repetir mais uma rodada ou avançar quando a fase liberar.':'Ainda não está firme. O melhor agora é repetir a mesma fase, sem correr para a próxima.'}</div></div><div class="card"><div class="kicker">Onde ele tropeçou</div><div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">${last.items.map((it,idx)=>`<div class="${it.result==='ok'?'hint':'warn'}"><div><strong>Q${idx+1}</strong> — ${it.ctx}</div><div style="font-size:15px;opacity:.95;margin-top:6px">${it.result==='ok'?'Acertou.':'Tipo de erro: '+it.errorKind}</div></div>`).join('')}</div></div>${unlockedNext?`<button class="btn" onclick="startPhase(${ui.phaseIndex+1})">Próxima fase → ${PHASES[ui.phaseIndex+1].emoji} ${PHASES[ui.phaseIndex+1].title}</button>`:''}<button class="help" onclick="askMom(true)">Enviar resultado para a mãe</button><button class="btn2" onclick="startPhase(${ui.phaseIndex})">Repetir esta fase</button><button class="btn2" onclick="goHome()">← Voltar ao menu</button><div class="footerSpace"></div></div></div>`;
}
function askMom(withReport){
  let msg="";
  if(withReport){
    if(ui.screen==="result"){
      const ph=PHASES[ui.phaseIndex], pd=phaseData(ph.id), last=pd.attempts[pd.attempts.length-1];
      msg=`📊 Pedro — ${ph.emoji} ${ph.title}\nRodada: ${last.when}\n\n✅ Acertos: ${last.ok}\n⚠️ Erros: ${last.errors}\n⭐ Rodada estável: ${last.stable ? "sim" : "não"}\n\nDetalhes:\n${last.items.map((it,idx)=>`${it.result==='ok'?'✅':'⚠️'} Q${idx+1}: ${it.ctx}${it.result==='error' ? ` | erro: ${it.errorKind}`:''}`).join('\n')}\n\nRecomendação:\n${last.stable ? 'Pode seguir repetindo ou avançar quando a fase liberar.' : 'Melhor repetir esta fase antes de avançar.'}`;
    } else msg="Oi. Quero te mostrar o progresso do Pedro no jogo de inteiros.";
  } else msg="Oi. O Pedro está com dúvida nesta fase do jogo. Pode ajudar?";
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`,'_blank');
}
function renderQuestion(q){
  const road=q.road?roadHTML(q.road):'';
  return `<div class="card fade"><div class="kicker">Treino</div><div class="small">${q.ctx}</div><div class="big">${q.ask}</div>${road}<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">${q.options.map((op,idx)=>{let cls='opt'; if(ui.answered&&idx===q.correct) cls+=' ok'; if(ui.answered&&idx===ui.selected&&idx!==q.correct) cls+=' bad'; if(ui.answered&&idx!==ui.selected&&idx!==q.correct) cls+=' ghost'; return `<button class="${cls}" onclick="answerQ(${idx})">${op}</button>`;}).join('')}</div>${ui.answered?`<div style="height:10px"></div><div class="${ui.selected===q.correct?'hint':'warn'}">${ui.selected===q.correct?q.feedback.ok:q.feedback.err}</div>`:''}</div>`;
}
function renderPhase(){
  const ph=PHASES[ui.phaseIndex], totalProgress=ui.stepType==="teach"?ph.teach.length:ph.questions.length, currentProgress=ui.stepType==="teach"?ui.teachIndex+1:ui.qIndex+1;
  document.getElementById('app').innerHTML=`<div class="app">${phaseHeader(ph,ui.phaseIndex)}<div class="wrap"><div class="pill">${ph.focus}</div><div class="progress">${Array.from({length:totalProgress}).map((_,i)=>`<div class="${i<currentProgress?'on':''}"></div>`).join('')}</div>${ui.stepType==="teach"?renderTeach(ph.teach[ui.teachIndex]):renderQuestion(ph.questions[ui.qIndex])}${ui.stepType==="teach"?`<button class="btn" onclick="nextTeach()">${ui.teachIndex<ph.teach.length-1?'Continuar aprendendo →':'Ir para o treino →'}</button>`:(ui.answered?`<button class="btn" onclick="nextQuestion()">${ui.qIndex<ph.questions.length-1?'Próxima questão →':'Concluir rodada →'}</button>`:'')}<button class="help" onclick="askMom(false)">❤️ Chamar a mãe</button><div class="footerSpace"></div></div></div>`;
}
renderHome();
