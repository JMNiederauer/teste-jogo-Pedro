// Reta numérica animada — canal visuoespacial do Pedro
function Reta({hl=null,start=null,end=null,dist=false,animar=false}){
  // Range dinâmico: calcula MIN/MAX a partir dos valores reais (corrige bug do Sauron desaparecer)
  const vals=[0,hl,start,end].filter(v=>v!=null);
  const dataMin=Math.min(...vals),dataMax=Math.max(...vals);
  const span=Math.max(dataMax-dataMin,4);
  const pad=Math.max(Math.round(span*0.3),2);
  const rawRange=(dataMax+pad)-(dataMin-pad);
  const step=rawRange>60?10:rawRange>30?5:rawRange>16?2:1;
  const MIN=Math.floor((dataMin-pad)/step)*step;
  const MAX=Math.ceil((dataMax+pad)/step)*step;
  const nums=[];
  for(let i=MIN;i<=MAX;i+=step) nums.push(i);
  const pct=n=>((n-MIN)/(MAX-MIN))*100;
  const [dog,setDog]=useState(end!=null?(start??0):(hl!=null?hl:0));
  const [anda,setAnda]=useState(false);
  useEffect(()=>{
    if(!animar||end==null)return;
    setDog(start??0);
    const t=setTimeout(()=>{
      setAnda(true);
      let cur=start??0;
      const dir=end>cur?1:-1;
      const iv=setInterval(()=>{
        cur+=dir*step;
        if((dir>0&&cur>=end)||(dir<0&&cur<=end)){
          setDog(end);clearInterval(iv);setAnda(false);
        } else {setDog(cur);}
      },220);
      return()=>clearInterval(iv);
    },500);
    return()=>clearTimeout(t);
  },[animar,start,end]);
  const dp=end!=null?(animar?dog:end):hl;
  return(
    <div style={{background:"rgba(255,255,255,0.06)",borderRadius:"16px",padding:"10px 14px",border:"1px solid rgba(255,255,255,0.08)"}}>
      <div style={{position:"relative",width:"100%",padding:"38px 6px 18px",userSelect:"none"}}>
        {start!=null&&end!=null&&<div style={{position:"absolute",height:"7px",borderRadius:"4px",background:end>=start?"rgba(52,211,153,0.35)":"rgba(248,113,113,0.35)",left:`${Math.min(pct(start),pct(end))}%`,width:`${Math.abs(pct(end)-pct(start))}%`,top:"27px"}}/>}
        {dist&&hl!=null&&hl!==0&&<>
          <div style={{position:"absolute",height:"2px",background:"#FBBF24",opacity:.8,left:`${Math.min(pct(0),pct(hl))}%`,width:`${Math.abs(pct(hl)-pct(0))}%`,top:"18px"}}/>
          <div style={{position:"absolute",color:"#FBBF24",fontWeight:900,fontSize:"14px",left:`${(pct(0)+pct(hl))/2}%`,top:"2px",transform:"translateX(-50%)",background:"rgba(0,0,0,0.6)",padding:"1px 6px",borderRadius:"6px"}}>{Math.abs(hl)} passos</div>
        </>}
        <div style={{position:"relative",height:"5px",background:"rgba(107,114,128,0.3)",margin:"0 10px",borderRadius:"3px"}}>
          <div style={{position:"absolute",left:"-14px",top:"-10px",color:"#6B7280",fontSize:"16px"}}>◄</div>
          <div style={{position:"absolute",right:"-14px",top:"-10px",color:"#6B7280",fontSize:"16px"}}>►</div>
          {nums.map(n=>(
            <div key={n} style={{position:"absolute",left:`${pct(n)}%`,transform:"translateX(-50%)"}}>
              <div style={{width:n===0?"4px":"2px",height:n===0?"22px":"12px",background:n===0?"#FBBF24":"rgba(107,114,128,0.5)",margin:"0 auto",marginTop:n===0?"-9px":"-4px"}}/>
              <div style={{textAlign:"center",marginTop:"5px",fontSize:n===0?"16px":"13px",fontWeight:n===0?900:700,color:n===0?"#FBBF24":n===dp?"#34D399":"rgba(107,114,128,0.6)"}}>{n}</div>
            </div>
          ))}
          {dp!=null&&<>
            <div style={{position:"absolute",left:`${pct(dp)}%`,transform:"translateX(-50%) translateY(-100%)",top:"-2px",fontSize:"36px",filter:"drop-shadow(0 0 14px rgba(52,211,153,1))",transition:animar?"left 0.2s linear":"none"}} className={anda?"wk":""}>🥷</div>
            <div style={{position:"absolute",left:`${pct(dp)}%`,transform:"translateX(-50%)",top:"-42px",background:"rgba(52,211,153,0.95)",color:"#000",fontWeight:900,fontSize:"16px",padding:"3px 10px",borderRadius:"8px",transition:animar?"left 0.2s linear":"none",whiteSpace:"nowrap"}}>{dp>0?"+":""}{dp}</div>
          </>}
          {animar&&start!=null&&<div style={{position:"absolute",left:`${pct(start)}%`,transform:"translateX(-50%) translateY(-100%)",top:"-2px",fontSize:"15px",opacity:.4}}>📍</div>}
        </div>
      </div>
    </div>
  );
}

function Item({item}){

    if(item.t==="exemploAnm"||item.t==="reta"){const t=setTimeout(()=>setAnm(true),600);return()=>clearTimeout(t);}

  if(item.t==="aviso") return <div style={{background:"rgba(120,40,0,0.2)",borderLeft:"4px solid #FB923C",borderRadius:"0 12px 12px 0",padding:"14px 16px"}} className="up">{item.v.split('\n').map((l,i)=><p key={i} style={{color:"#FED7AA",fontSize:"21px",fontWeight:700,margin:i?"8px 0 0":0}}>{l}</p>)}</div>;
  if(item.t==="regra") return <div style={{background:"rgba(60,20,100,0.2)",borderLeft:"4px solid #A78BFA",borderRadius:"0 12px 12px 0",padding:"14px 16px"}} className="up">{item.v.split('\n').map((l,i)=><p key={i} style={{color:"#DDD6FE",fontSize:"21px",fontWeight:800,margin:i?"8px 0 0":0}}>{l}</p>)}</div>;
  // BigRegra — parece power-up descoberto

  if(item.t==="reta") return <div className="up"><Reta hl={item.hl} animar={anm}/></div>;
  // Lista — sem caixas, só bullets coloridos

  // Cards — cada um com cor única e número dominante

  // ModEx — o número em destaque absoluto
  if(item.t==="modEx") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"12px"}}>{item.ns.map((n,i)=><div key={i} style={{background:"rgba(120,80,0,0.2)",borderLeft:"4px solid #FBBF24",borderRadius:"0 12px 12px 0",padding:"16px"}}><p style={{color:"#FBBF24",fontSize:"36px",fontWeight:900,textAlign:"center",margin:"0 0 10px",fontFamily:"monospace",textShadow:"0 0 10px rgba(251,191,36,0.45)"}}>|{n}| = {Math.abs(n)}</p><Reta hl={n} dist/></div>)}</div>;
  // Notacao — estilo inventário de jogo
  if(item.t==="notacao") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"8px"}}>{item.ns.map((x,i)=><div key={i} style={{background:"rgba(0,60,30,0.3)",borderLeft:"4px solid #34D399",borderRadius:"0 12px 12px 0",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"12px"}}><p style={{color:"#6EE7B7",fontSize:"26px",fontWeight:900,fontFamily:"monospace",margin:0,flexShrink:0}}>{x.e}</p><p style={{color:"rgba(156,163,175,1)",fontSize:"16px",fontWeight:600,margin:0,textAlign:"right"}}>{x.d}</p></div>)}</div>;
  if(item.t==="retaEx") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"12px"}}>{item.ex.map((x,i)=><div key={i}><p style={{color:"#6EE7B7",fontSize:"20px",fontWeight:700,margin:"0 0 8px",paddingLeft:"4px"}}>{x.desc}</p><Reta hl={x.n}/></div>)}</div>;
  // Espelho — visual de reflexo com labels
  if(item.t==="espelho") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"12px"}}>{item.pares.map((x,i)=><div key={i} style={c}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}><div style={{textAlign:"center"}}><div style={{color:"rgba(147,197,253,0.5)",fontSize:"10px",fontWeight:800,letterSpacing:"1px",marginBottom:"2px"}}>OPOSTO</div><div style={{color:"#93C5FD",fontSize:"34px",fontWeight:900,fontFamily:"monospace"}}>{x.s}</div></div><div style={{textAlign:"center"}}><div style={{fontSize:"22px"}}>🪞</div><div style={{color:"rgba(251,191,36,0.6)",fontSize:"10px",fontWeight:700,letterSpacing:"1px"}}>ZERO</div></div><div style={{textAlign:"center"}}><div style={{color:"rgba(252,165,165,0.5)",fontSize:"10px",fontWeight:800,letterSpacing:"1px",marginBottom:"2px"}}>ORIGINAL</div><div style={{color:"#FCA5A5",fontSize:"34px",fontWeight:900,fontFamily:"monospace"}}>+{x.n}</div></div></div><Reta hl={x.n}/></div>)}</div>;
  // Passos — HUD de jogo com ANTERIOR / POSIÇÃO / PRÓXIMO
  if(item.t==="passos") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"10px"}}>{item.ps.map((x,i)=><div key={i} style={c}><div style={{display:"flex",justifyContent:"space-around",alignItems:"center",marginBottom:x.nota?"12px":0}}><div style={{textAlign:"center"}}><div style={{color:"rgba(147,197,253,0.5)",fontSize:"10px",fontWeight:800,letterSpacing:"1px",marginBottom:"4px"}}>ANTERIOR</div><div style={{color:"#93C5FD",fontSize:"28px",fontWeight:900}}>← {x.ant}</div></div><div style={{textAlign:"center"}}><div style={{color:"rgba(255,255,255,0.4)",fontSize:"10px",fontWeight:800,letterSpacing:"1px",marginBottom:"4px"}}>POSIÇÃO</div><div style={{color:"#fff",fontSize:"42px",fontWeight:900,lineHeight:1}}>{x.n}</div></div><div style={{textAlign:"center"}}><div style={{color:"rgba(52,211,153,0.5)",fontSize:"10px",fontWeight:800,letterSpacing:"1px",marginBottom:"4px"}}>PRÓXIMO</div><div style={{color:"#6EE7B7",fontSize:"28px",fontWeight:900}}>{x.suc} →</div></div></div>{x.nota&&<p style={{color:"#FDE68A",fontSize:"17px",fontWeight:800,margin:0,paddingTop:"10px",borderTop:"1px solid rgba(255,255,255,0.07)"}}>{x.nota}</p>}</div>)}</div>;
  if(item.t==="direcao") return <div className="up" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>{item.ds.map((r,i)=><div key={i} style={{borderRadius:"14px",padding:"20px 16px",textAlign:"center",border:`2px solid ${i===0?"rgba(52,211,153,0.5)":"rgba(248,113,113,0.5)"}`,background:i===0?"rgba(0,60,30,0.4)":"rgba(80,0,0,0.4)"}}><div style={{fontSize:"42px"}}>{r.em}</div><p style={{color:i===0?"rgba(52,211,153,0.7)":"rgba(248,113,113,0.7)",fontSize:"13px",fontWeight:800,margin:"10px 0 4px",letterSpacing:".5px"}}>{r.sinal}</p><p style={{color:"#fff",fontSize:"26px",fontWeight:900,margin:0}}>{r.dir}</p></div>)}</div>;
  // ExemploAnm — log de ação de jogo
  if(item.t==="exemploAnm") return <div style={{background:"rgba(120,80,0,0.2)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:"12px",padding:"16px"}} className="up"><p style={{color:"#FBBF24",fontWeight:900,textAlign:"center",fontSize:"30px",margin:"0 0 14px",fontFamily:"monospace",textShadow:"0 0 10px rgba(251,191,36,0.4)"}}>{item.expr}</p><div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"14px"}}>{item.passos.map((s,i)=><div key={i} style={{display:"flex",gap:"12px",alignItems:"flex-start"}}><span style={{background:"rgba(251,191,36,0.2)",color:"#FBBF24",fontSize:"13px",fontWeight:800,minWidth:"24px",height:"24px",borderRadius:"6px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:"1px"}}>{i+1}</span><span style={{color:"#E5E7EB",fontSize:"21px",fontWeight:700}}>{s}</span></div>)}</div>{item.nl&&<Reta start={item.nl.start} end={item.nl.end} animar={anm}/>}</div>;
  // RegraBox — com borda lateral por regra
  if(item.t==="regraBox") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"10px"}}>{item.rs.map((r,i)=><div key={i} style={{background:"rgba(255,255,255,0.05)",borderLeft:`4px solid ${i===0?"#FBBF24":"#93C5FD"}`,borderRadius:"0 12px 12px 0",padding:"14px 16px"}}><p style={{color:i===0?"#FBBF24":"#93C5FD",fontSize:"14px",fontWeight:900,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:".8px"}}>{r.tit}</p><p style={{color:"#E5E7EB",fontSize:"20px",fontWeight:700,margin:"0 0 8px"}}>{r.reg}</p><p style={{color:"#6EE7B7",fontSize:"20px",fontFamily:"monospace",fontWeight:900,margin:0,whiteSpace:"pre-line"}}>{r.ex}</p></div>)}</div>;

  return null;
}

function App(){
  // Persistência de sessões — laudo: critério de avanço = estabilização, não "entendeu uma vez"
  const [storage,setStorage]=useState(()=>{
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||{blocos:{}}; }
    catch{ return {blocos:{}}; }
  });

  const [tela,setTela]=useState("home");
  const [bi,setBi]=useState(0);
  const [fase,setFase]=useState("slides");
  const [ri,setRi]=useState(0);
  const [si,setSi]=useState(0);
  const [qi,setQi]=useState(0);
  const [sel,setSel]=useState(null);
  const [tent,setTent]=useState(0);
  // retaVis: reta disponível ANTES do erro — laudo: suporte antecipado, não como punição
  const [retaVis,setRetaVis]=useState(false);
  const [rev,setRev]=useState(false);
  const [humor,setHumor]=useState("n");
  // log detalhado por questão — laudo: relatório rico para mediação externa da mãe
  const [log,setLog]=useState([]);

  const B=BLOCOS[bi]||BLOCOS[0];

  // Quantas sessões o Pedro completou neste bloco
  const getSessoes=id=>storage.blocos[id]?.sessoes||0;

  // Bloco desbloqueado quando o anterior tiver sessões suficientes
  const blocoDesbloqueado=i=>{
    if(i===0) return true;
    const prev=BLOCOS[i-1];
    return getSessoes(prev.id)>=prev.sessoesNecessarias;
  };

  // Salva sessão concluída no localStorage
  const salvarSessao=id=>{
    const n=(storage.blocos[id]?.sessoes||0)+1;
    const novo={...storage,blocos:{...storage.blocos,[id]:{sessoes:n,data:new Date().toLocaleDateString('pt-BR')}}};
    setStorage(novo);
    try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(novo)); }catch{}
    return n;
  };

  const rst=()=>{setSel(null);setTent(0);setRetaVis(false);setRev(false);};

  const avan=()=>{
    setHumor("n");rst();
    if(fase==="rev"){
      if(B.revisao&&ri<B.revisao.length-1) setRi(r=>r+1);
      else{ setFase("slides");setSi(0); }
    }else if(fase==="slides"){
      if(si<B.slides.length-1) setSi(s=>s+1);
      else{ setFase("qs");setQi(0); }
    }else{
      if(qi<B.questoes.length-1) setQi(q=>q+1);
      else{
        salvarSessao(B.id);
        setTela("sessao");
      }
    }
  };

  const iniciar=i=>{
    setBi(i);setTela("bloco");rst();setRi(0);setSi(0);setQi(0);setHumor("n");setLog([]);
    setFase(BLOCOS[i].revisao?"rev":"slides");
  };

  const pick=i=>{
    if(sel!=null||rev) return;
    const q=B.questoes[qi];
    const t=tent+1;
    setTent(t);
    setSel(i);
    if(i===q.ok){
      setHumor("f");
      const res=t===1?"ok":retaVis?"com_reta":"tentou";
      setLog(l=>[...l,{qi,ctx:q.ctx,perg:q.perg,res}]);
    }else{
      setHumor("c");
      // Laudo: medo de errar, perfeccionismo → mostra resposta correta imediatamente, sem "tenta de novo"
      setRev(true);
      setLog(l=>[...l,{qi,ctx:q.ctx,perg:q.perg,res:"revelou"}]);
    }
  };

  // Relatório rico — laudo: mãe precisa saber qual questão específica precisou de mediação
  const wa=tipo=>{
    let msg="";
    if(tipo==="rel"){
      const sessoes=getSessoes(B.id);
      const ok=log.filter(x=>x.res==="ok").length;
      const dc=log.filter(x=>x.res==="com_reta"||x.res==="tentou").length;
      const rv=log.filter(x=>x.res==="revelou").length;
      const det=log.map((x,idx)=>{
        const ic=x.res==="ok"?"✅":x.res==="revelou"?"⚠️":"💡";
        return `${ic} Q${idx+1}: ${x.ctx}`;
      }).join("\n");
      const revisar=log.filter(x=>x.res==="revelou");
      let rec="";
      if(rv===0) rec="🌟 Excelente! Pode avançar normalmente.";
      else if(rv===1) rec=`💬 Revisar oralmente com Pedro: Q${log.findIndex(x=>x.res==="revelou")+1} — ${revisar[0]?.ctx}`;
      else rec=`🔁 Recomendo repetir este bloco antes de avançar (${rv} questões precisaram da resposta)`;
      msg=`📊 *Pedro — ${B.emoji} ${B.titulo}*\n`+
          `Sessão ${sessoes} de ${B.sessoesNecessarias} | ${storage.blocos[B.id]?.data||"hoje"}\n\n`+
          `${det}\n\n`+
          `✅ Direto: ${ok}   💡 Com apoio: ${dc}   ⚠️ Revelou: ${rv}\n\n`+
          rec;
    }else{
      msg=`Oi mãe! Estou com dúvida no *${B.emoji} ${B.titulo}*. Pode me ajudar?`;
    }
    window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`,"_blank");
  };

  const dog=humor==="f"?"bn":humor==="c"?"sh":"";
  const g0=B.grad[0],g1=B.grad[1];
  const btnP={width:"100%",padding:"17px",borderRadius:"14px",border:"none",cursor:"pointer",background:`linear-gradient(135deg,${g0},${g1})`,color:"#fff",fontSize:"18px",fontWeight:800,boxShadow:`0 3px 14px ${g0}44`};

  // Botão da mãe — grande, quente, sempre visível — laudo: raramente pede ajuda espontaneamente
  const BtnMae=({tipo="dv"})=>(
    <button onClick={()=>wa(tipo==="rel"?"rel":"dv")} className="gl"
      style={{width:"100%",padding:"17px",borderRadius:"14px",border:"none",cursor:"pointer",background:"linear-gradient(135deg,#92400E,#D97706)",color:"#FEF3C7",fontSize:"17px",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",boxShadow:"0 3px 14px rgba(245,158,11,0.3)"}}>
      ❤️ {tipo==="rel"?"Enviar resultado para a mãe":"Estou com dúvida — chamar a mãe"}
    </button>
  );

  // ─── TELA INICIAL ────────────────────────────────────────────────────────────
  if(tela==="home") return(
    <><style>{css}</style>
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#0D1117 0%,#0B0F1A 100%)",color:"#fff",paddingBottom:"50px"}}>
      {/* Header game-style */}
      <div style={{padding:"32px 24px 20px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{fontSize:"52px",filter:"drop-shadow(0 4px 16px rgba(52,211,153,0.5))"}}>🥷</div>
        <h1 style={{fontSize:"30px",fontWeight:900,margin:"10px 0 2px",letterSpacing:"1px"}}>TREINO DO PEDRO</h1>
        <p style={{color:"rgba(107,114,128,1)",fontSize:"14px",fontWeight:600,margin:0,letterSpacing:"2px",textTransform:"uppercase"}}>Números Inteiros · Modo Campanha</p>
      </div>
      {/* Level select */}
      <div style={{padding:"16px 16px 0",display:"flex",flexDirection:"column",gap:"10px",maxWidth:"440px",margin:"0 auto"}}>
        {BLOCOS.map((b,i)=>{
          const desbloqueado=blocoDesbloqueado(i);
          const sessoes=getSessoes(b.id);
          const dominado=sessoes>=b.sessoesNecessarias;
          const stars=dominado?b.sessoesNecessarias:sessoes;
          return(
            <button key={b.id} onClick={()=>desbloqueado&&iniciar(i)}
              style={{width:"100%",textAlign:"left",padding:"14px 16px",borderRadius:"12px",
                border:desbloqueado?"1px solid rgba(255,255,255,0.08)":"1px solid rgba(255,255,255,0.04)",
                cursor:desbloqueado?"pointer":"default",
                background:desbloqueado?`linear-gradient(135deg,${b.grad[0]}cc,${b.grad[1]}cc)`:"rgba(255,255,255,0.03)",
                boxShadow:desbloqueado?`0 4px 20px ${b.grad[0]}44,inset 0 1px 0 rgba(255,255,255,0.1)`:"none",
                opacity:desbloqueado?1:0.35,position:"relative"}}>
              <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                {/* Número da fase */}
                <div style={{minWidth:"44px",height:"44px",borderRadius:"10px",background:"rgba(0,0,0,0.3)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:"1px solid rgba(255,255,255,0.12)"}}>
                  <span style={{color:"rgba(255,255,255,0.5)",fontSize:"9px",fontWeight:800,letterSpacing:"1px"}}>FASE</span>
                  <span style={{color:"#fff",fontSize:"20px",fontWeight:900,lineHeight:1}}>{i+1}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                    <p style={{fontWeight:900,color:desbloqueado?"#fff":"rgba(156,163,175,0.4)",fontSize:"19px",margin:0,lineHeight:1.2}}>{b.emoji} {b.titulo}</p>
                  </div>
                  {desbloqueado&&(
                    <div style={{display:"flex",gap:"2px",marginTop:"5px"}}>
                      {Array.from({length:b.sessoesNecessarias},(_,idx)=>(
                        <span key={idx} style={{fontSize:"13px",opacity:idx<stars?1:0.25}}>⭐</span>
                      ))}
                      {dominado&&<span style={{fontSize:"11px",color:"#6EE7B7",fontWeight:800,marginLeft:"6px",alignSelf:"center"}}>CONCLUÍDA</span>}
                    </div>
                  )}
                  {!desbloqueado&&<p style={{color:"rgba(107,114,128,0.4)",fontSize:"13px",fontWeight:600,margin:"3px 0 0"}}>🔒 Conclua a fase anterior</p>}
                </div>
                {desbloqueado&&<span style={{color:"rgba(255,255,255,0.5)",fontSize:"22px",fontWeight:900}}>›</span>}
              </div>
            </button>
          );
        })}
      </div>
    </div></>
  );

  // ─── TELA DE SESSÃO CONCLUÍDA ────────────────────────────────────────────────
  // Nova tela — laudo: Pedro precisa de feedback imediato, mãe precisa de relatório detalhado
  if(tela==="sessao"){
    const sessoesFeitasAgora=getSessoes(B.id);
    const dominado=sessoesFeitasAgora>=B.sessoesNecessarias;
    const ok=log.filter(x=>x.res==="ok").length;
    const dc=log.filter(x=>x.res==="com_reta"||x.res==="tentou").length;
    const rv=log.filter(x=>x.res==="revelou").length;
    const precisaRepetir=rv>=2;
    const proximoIndex=bi+1;
    const temProximo=proximoIndex<BLOCOS.length;
    return(
      <><style>{css}</style>
      <div style={{minHeight:"100vh",background:"#0B0F1A",color:"#fff",display:"flex",flexDirection:"column",alignItems:"center",padding:"30px 16px 50px",gap:"16px"}}>
        {/* Hero section */}
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:"68px",filter:"drop-shadow(0 4px 20px rgba(52,211,153,0.6))"}} className="bn">🥷</div>
          <h2 style={{fontSize:"32px",fontWeight:900,color:dominado&&!precisaRepetir?"#6EE7B7":"#FBBF24",margin:"12px 0 4px",letterSpacing:".5px"}}>
            {dominado&&!precisaRepetir?"FASE VENCIDA! 🏆":"RODADA CONCLUÍDA"}
          </h2>
          <p style={{color:"rgba(156,163,175,1)",fontSize:"16px",fontWeight:600,margin:0}}>
            FASE {bi+1} · {B.emoji} {B.titulo}
          </p>
        </div>

        {/* Estrelas de progresso */}
        <div style={{width:"100%",maxWidth:"400px",textAlign:"center"}}>
          <div style={{display:"flex",justifyContent:"center",gap:"8px",marginBottom:"6px"}}>
            {Array.from({length:B.sessoesNecessarias},(_,idx)=>(
              <span key={idx} style={{fontSize:"30px",filter:idx<sessoesFeitasAgora?"drop-shadow(0 0 8px rgba(251,191,36,0.8))":"none",opacity:idx<sessoesFeitasAgora?1:0.2,transition:"all 0.5s"}}>⭐</span>
            ))}
          </div>
          <p style={{color:"rgba(107,114,128,1)",fontSize:"13px",fontWeight:700,margin:0,letterSpacing:"1px",textTransform:"uppercase"}}>
            {dominado?`Fase dominada!`:`Rodada ${sessoesFeitasAgora} de ${B.sessoesNecessarias}`}
          </p>
        </div>

        {/* Placar da rodada */}
        <div style={{width:"100%",maxWidth:"400px",background:"rgba(255,255,255,0.04)",borderRadius:"16px",padding:"18px",border:"1px solid rgba(255,255,255,0.08)"}}>
          <p style={{color:"rgba(107,114,128,1)",fontSize:"11px",fontWeight:800,margin:"0 0 14px",textTransform:"uppercase",letterSpacing:"1.5px"}}>Placar desta rodada</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",textAlign:"center"}}>
            <div style={{background:"rgba(52,211,153,0.1)",borderRadius:"12px",padding:"14px 6px",border:"1px solid rgba(52,211,153,0.15)"}}>
              <div style={{fontSize:"38px",fontWeight:900,color:"#6EE7B7",lineHeight:1}}>{ok}</div>
              <div style={{fontSize:"11px",color:"rgba(52,211,153,0.7)",fontWeight:800,marginTop:"6px",letterSpacing:".5px",textTransform:"uppercase"}}>Perfeito</div>
            </div>
            <div style={{background:"rgba(147,197,253,0.1)",borderRadius:"12px",padding:"14px 6px",border:"1px solid rgba(147,197,253,0.15)"}}>
              <div style={{fontSize:"38px",fontWeight:900,color:"#93C5FD",lineHeight:1}}>{dc}</div>
              <div style={{fontSize:"11px",color:"rgba(147,197,253,0.7)",fontWeight:800,marginTop:"6px",letterSpacing:".5px",textTransform:"uppercase"}}>Com apoio</div>
            </div>
            <div style={{background:"rgba(252,165,165,0.1)",borderRadius:"12px",padding:"14px 6px",border:"1px solid rgba(252,165,165,0.15)"}}>
              <div style={{fontSize:"38px",fontWeight:900,color:"#FCA5A5",lineHeight:1}}>{rv}</div>
              <div style={{fontSize:"11px",color:"rgba(252,165,165,0.7)",fontWeight:800,marginTop:"6px",letterSpacing:".5px",textTransform:"uppercase"}}>Revelou</div>
            </div>
          </div>
        </div>

        {/* Desbloqueio de nova fase */}
        {dominado&&!precisaRepetir&&temProximo&&(
          <div style={{width:"100%",maxWidth:"400px",background:"rgba(0,50,25,0.4)",border:"2px solid rgba(52,211,153,0.4)",borderRadius:"14px",padding:"14px 18px",textAlign:"center"}}>
            <p style={{color:"#6EE7B7",fontSize:"17px",fontWeight:900,margin:0}}>🔓 FASE {bi+2} DESBLOQUEADA!</p>
            <p style={{color:"rgba(52,211,153,0.6)",fontSize:"14px",fontWeight:600,margin:"4px 0 0"}}>{BLOCOS[proximoIndex].emoji} {BLOCOS[proximoIndex].titulo}</p>
          </div>
        )}

        {/* Recomendação — laudo: Pedro não vê erro; mãe recebe via WhatsApp */}
        {precisaRepetir&&(
          <div style={{width:"100%",maxWidth:"400px",background:"rgba(90,60,0,0.3)",border:"1px solid rgba(251,191,36,0.35)",borderRadius:"14px",padding:"14px 18px"}}>
            <p style={{color:"#FDE68A",fontSize:"16px",fontWeight:700,margin:0}}>Quer tentar mais uma rodada? Treinar mais ajuda a fixar.</p>
          </div>
        )}

        {/* Ações */}
        <div style={{width:"100%",maxWidth:"400px",display:"flex",flexDirection:"column",gap:"10px"}}>
          {/* Botão da mãe com relatório detalhado — laudo: mediação externa essencial */}
          <BtnMae tipo="rel"/>
          {dominado&&temProximo&&!precisaRepetir?(
            <button onClick={()=>iniciar(proximoIndex)} style={{...btnP,padding:"19px",fontSize:"20px",fontWeight:900}}>
              Próxima Fase → FASE {bi+2}
            </button>
          ):(
            <button onClick={()=>iniciar(bi)}
              style={{width:"100%",padding:"17px",borderRadius:"12px",border:"none",background:`linear-gradient(135deg,${g0},${g1})`,color:"#fff",fontSize:"18px",fontWeight:800,cursor:"pointer"}}>
              🔄 Repetir Rodada
            </button>
          )}
          <button onClick={()=>setTela("home")}
            style={{width:"100%",padding:"14px",borderRadius:"12px",border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"rgba(209,213,219,1)",fontSize:"17px",fontWeight:700,cursor:"pointer"}}>
            ← Menu Principal
          </button>
        </div>
      </div></>
    );
  }

  // ─── TELA DE BLOCO ────────────────────────────────────────────────────────────
  const q=fase==="qs"?B.questoes[qi]:null;
  const rv2=(fase==="rev"&&B.revisao)?B.revisao[ri]:null;
  const sl=fase==="slides"?B.slides[si]:null;
  const acertou=sel!=null&&q&&sel===q.ok;
  const sessaoAtual=getSessoes(B.id)+1;

  return(
    <><style>{css}</style>
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#0D1117 0%,#0B0F1A 100%)",color:"#fff",paddingBottom:"36px"}}>

      {/* HEADER */}
      <div style={{padding:"14px 16px 14px",background:`linear-gradient(160deg,${g0},${g1}bb)`,borderBottom:`2px solid ${g1}66`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
          <button onClick={()=>setTela("home")} style={{color:"rgba(255,255,255,0.65)",fontSize:"15px",fontWeight:700,background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}>← Menu</button>
          <div style={{textAlign:"center"}}>
            {/* Fase e rodada — terminologia de jogo */}
            <p style={{color:"rgba(255,255,255,0.5)",fontSize:"10px",fontWeight:800,margin:"0 0 1px",letterSpacing:"2px",textTransform:"uppercase"}}>FASE {bi+1} · RODADA {Math.min(sessaoAtual,B.sessoesNecessarias)}/{B.sessoesNecessarias}</p>
            <p style={{color:"#fff",fontWeight:900,fontSize:"17px",margin:0,letterSpacing:".3px"}}>{B.emoji} {B.titulo}</p>
          </div>
          {/* Botão da mãe no header — sempre visível — laudo: raramente pede ajuda */}
          <button onClick={()=>wa("dv")}
            style={{background:"rgba(0,0,0,0.25)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:"10px",width:"44px",height:"44px",fontSize:"18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>❤️</button>
        </div>
        {fase==="qs"&&(
          <div style={{display:"flex",gap:"4px",marginBottom:"10px"}}>
            {B.questoes.map((_,i)=><div key={i} style={{flex:1,height:"6px",borderRadius:"3px",background:i<=qi?`rgba(255,255,255,0.9)`:"rgba(0,0,0,0.3)",boxShadow:i<=qi?"0 0 6px rgba(255,255,255,0.4)":"none",transition:"all 0.3s"}}/>)}
          </div>
        )}
        <div style={{textAlign:"center"}}>
          <span style={{fontSize:"48px",display:"inline-block"}} className={dog}>🥷</span>
        </div>
      </div>

      <div style={{padding:"16px 16px",maxWidth:"440px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"14px"}}>
        <p style={{textAlign:"center",color:"rgba(107,114,128,0.7)",fontSize:"13px",fontWeight:700,margin:0,letterSpacing:"1.5px",textTransform:"uppercase"}}>
          {fase==="rev"&&"⚡ Revisão Rápida"}
          {fase==="slides"&&`📖 Parte ${si+1} de ${B.slides.length}`}
          {fase==="qs"&&`⚔️ Missão ${qi+1} de ${B.questoes.length}`}
        </p>

        {/* REVISÃO */}
        {fase==="rev"&&rv2&&(
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            <div style={{background:"rgba(37,99,235,0.2)",border:"2px solid rgba(59,130,246,0.4)",borderRadius:"14px",padding:"18px 20px"}}>
              <p style={{color:"#93C5FD",fontSize:"13px",fontWeight:800,margin:"0 0 10px",letterSpacing:"1.5px"}}>⚡ REVISÃO RÁPIDA</p>
              <p style={{color:"#fff",fontSize:"26px",fontWeight:900,margin:0,lineHeight:1.35}}>{rv2.perg}</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"9px"}}>
              {rv2.ops.map((o,i)=>(
                <button key={i} onClick={()=>{
                  if(i===rv2.ok){setHumor("f");setTimeout(()=>{setHumor("n");avan();},900);}
                  else{setHumor("c");setTimeout(()=>setHumor("n"),900);}
                }} style={{width:"100%",minHeight:"58px",textAlign:"left",padding:"14px 18px",borderRadius:"12px",border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.07)",color:"#E5E7EB",fontSize:"21px",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center"}}>{o}</button>
              ))}
            </div>
          </div>
        )}

        {/* SLIDES */}
        {fase==="slides"&&sl&&(
          <>
            <h2 style={{fontSize:"26px",fontWeight:900,color:"#FBBF24",margin:0,lineHeight:1.25,letterSpacing:".2px"}}>{sl.titulo}</h2>
            <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
              {sl.itens.map((it,i)=><Item key={i} item={it}/>)}
            </div>
            <button onClick={avan} style={btnP}>{si<B.slides.length-1?"Continuar →":"⚔️ Iniciar Missões →"}</button>
          </>
        )}

        {/* QUESTÕES */}
        {fase==="qs"&&q&&(
          <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
            <div style={{background:"rgba(255,255,255,0.06)",borderRadius:"14px",padding:"18px 20px",border:"1px solid rgba(255,255,255,0.08)"}}>
              <p style={{color:"rgba(107,114,128,1)",fontSize:"17px",fontWeight:600,margin:"0 0 8px"}}>{q.ctx}</p>
              <p style={{color:"#fff",fontSize:"27px",fontWeight:900,margin:0,lineHeight:1.35}}>{q.perg}</p>
            </div>

            {/* Reta numérica — sempre visível — laudo: memória operacional frágil, canal visuoespacial preservado */}
            {q.nl&&(
              <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"14px",padding:"12px 16px",border:"1px solid rgba(251,191,36,0.3)"}}>
                <p style={{color:"rgba(251,191,36,0.8)",fontSize:"14px",fontWeight:600,margin:"0 0 6px",letterSpacing:".2px"}}>🥷 Reta numérica</p>
                <Reta hl={q.nl.hl??null} start={q.nl.start??null} end={q.nl.end??null} dist={q.nl.dist??false} animar/>
              </div>
            )}

            {/* Opções de resposta */}
            <div style={{display:"flex",flexDirection:"column",gap:"9px"}}>
              {q.ops.map((o,i)=>{
                let bg="rgba(255,255,255,0.07)",br="1px solid rgba(255,255,255,0.09)",fc="#E5E7EB",op=1;
                let prefix=null;
                if(sel===i&&acertou){
                  bg="rgba(0,70,35,0.6)";br="2px solid #34D399";fc="#A7F3D0";
                  prefix=<span style={{marginRight:"10px",color:"#34D399",fontWeight:900,fontSize:"17px",flexShrink:0}}>✓</span>;
                } else if(sel===i&&!acertou){
                  bg="rgba(60,0,0,0.55)";br="2px solid rgba(248,113,113,0.6)";fc="#FCA5A5";
                  prefix=<span style={{marginRight:"10px",color:"#FCA5A5",fontWeight:900,fontSize:"17px",flexShrink:0}}>✗</span>;
                } else if(rev&&i===q.ok){
                  bg="rgba(0,70,35,0.45)";br="2px solid rgba(52,211,153,0.55)";fc="#A7F3D0";
                  prefix=<span style={{marginRight:"10px",color:"#34D399",fontWeight:900,fontSize:"17px",flexShrink:0}}>✓</span>;
                } else if(sel!=null){
                  op=0.28;
                }
                return(
                  <button key={i} onClick={()=>sel==null?pick(i):null}
                    style={{width:"100%",minHeight:"66px",textAlign:"left",padding:"16px 20px",borderRadius:"12px",border:br,background:bg,color:fc,fontSize:"22px",fontWeight:700,cursor:sel==null?"pointer":"default",transition:"opacity 0.25s,background 0.2s,border 0.2s,box-shadow 0.2s",display:"flex",alignItems:"center",opacity:op,boxShadow:sel===i&&acertou?"0 0 18px rgba(52,211,153,0.35)":sel===i&&!acertou?"0 0 14px rgba(248,113,113,0.25)":"none"}}>
                    {prefix}{o}
                  </button>
                );
              })}
            </div>

            {/* Feedback — laudo: nunca "errado"; reta como suporte, nunca punição */}
            {sel!=null&&(
              <div className="pop" style={{borderRadius:"16px",padding:"16px 18px",
                background:acertou?"rgba(0,70,35,0.55)":"rgba(255,255,255,0.06)",
                border:acertou?"2px solid rgba(52,211,153,0.55)":"1px solid rgba(255,255,255,0.08)"}}>
                {acertou?(
                  <>
                    <p style={{color:"#6EE7B7",fontWeight:900,fontSize:"28px",margin:"0 0 6px",letterSpacing:".5px"}}>CORRETO! 🎯</p>
                    <p style={{color:"rgba(209,213,219,1)",fontSize:"19px",fontWeight:600,margin:0,lineHeight:1.55}}>{q.feed}</p>
                  </>
                ):rev?(
                  // Nunca "errado" — laudo: medo de errar, perfeccionismo
                  <>
                    <p style={{color:"#FBBF24",fontWeight:900,fontSize:"22px",margin:"0 0 6px"}}>Veja como fica 👇</p>
                    <p style={{color:"rgba(209,213,219,1)",fontSize:"19px",fontWeight:600,margin:0,lineHeight:1.55}}>{q.feed}</p>
                  </>
                ):null}
              </div>
            )}

            {(acertou||rev)&&(
              <button onClick={avan} style={btnP}>
                {qi<B.questoes.length-1?"Próxima missão →":"Concluir rodada 🏁"}
              </button>
            )}
          </div>
        )}

        {/* Botão da mãe — grande, sempre visível — laudo: raramente pede ajuda */}
        {fase!=="rev"&&<BtnMae tipo="dv"/>}
      </div>
    </div></>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
