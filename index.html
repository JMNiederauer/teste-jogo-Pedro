// Reta numérica animada — canal visuoespacial do Pedro
function Reta({hl=null,start=null,end=null,dist=false,animar=false}){
  const MIN=-7,MAX=7,nums=[];
  for(let i=MIN;i<=MAX;i++) nums.push(i);
  const pct=n=>((n-MIN)/(MAX-MIN))*100;
  const [dog,setDog]=useState(start!=null?start:(hl!=null?hl:0));
  const [anda,setAnda]=useState(false);
  useEffect(()=>{
    if(!animar||end==null)return;
    setDog(start??0);
    const t=setTimeout(()=>{
      setAnda(true);
      let cur=start??0;
      const iv=setInterval(()=>{
        cur+=(end>cur?1:-1);
        setDog(cur);
        if(cur===end){clearInterval(iv);setAnda(false);}
      },220);
      return()=>clearInterval(iv);
    },500);
    return()=>clearTimeout(t);
  },[animar,start,end]);
  const dp=animar?dog:(end!=null?end:hl);
  return(
    <div style={{background:"rgba(255,255,255,0.06)",borderRadius:"16px",padding:"10px 14px",border:"1px solid rgba(255,255,255,0.08)"}}>
      <div style={{position:"relative",width:"100%",padding:"38px 6px 18px",userSelect:"none"}}>
        {start!=null&&end!=null&&<div style={{position:"absolute",height:"7px",borderRadius:"4px",background:end>=start?"rgba(52,211,153,0.35)":"rgba(248,113,113,0.35)",left:`${Math.min(pct(Math.max(start,MIN)),pct(Math.max(end,MIN)))}%`,width:`${Math.abs(pct(Math.min(end,MAX))-pct(Math.min(start,MAX)))}%`,top:"27px"}}/>}
        {dist&&hl!=null&&hl!==0&&<>
          <div style={{position:"absolute",height:"2px",background:"#FBBF24",opacity:.8,left:`${Math.min(pct(0),pct(hl))}%`,width:`${Math.abs(pct(hl)-pct(0))}%`,top:"18px"}}/>
          <div style={{position:"absolute",color:"#FBBF24",fontWeight:900,fontSize:"14px",left:`${(pct(0)+pct(hl))/2}%`,top:"2px",transform:"translateX(-50%)",background:"rgba(0,0,0,0.6)",padding:"1px 6px",borderRadius:"6px"}}>{Math.abs(hl)} passos</div>
        </>}
        <div style={{position:"relative",height:"3px",background:"rgba(107,114,128,0.35)",margin:"0 10px"}}>
          <div style={{position:"absolute",left:"-12px",top:"-9px",color:"#6B7280",fontSize:"14px"}}>◄</div>
          <div style={{position:"absolute",right:"-12px",top:"-9px",color:"#6B7280",fontSize:"14px"}}>►</div>
          {nums.map(n=>(
            <div key={n} style={{position:"absolute",left:`${pct(n)}%`,transform:"translateX(-50%)"}}>
              <div style={{width:n===0?"3px":"1px",height:n===0?"18px":"10px",background:n===0?"#FBBF24":"rgba(107,114,128,0.45)",margin:"0 auto",marginTop:n===0?"-8px":"-4px"}}/>
              <div style={{textAlign:"center",marginTop:"5px",fontSize:n===0?"14px":"11px",fontWeight:n===0?900:700,color:n===0?"#FBBF24":n===dp?"#34D399":"rgba(107,114,128,0.5)"}}>{n}</div>
            </div>
          ))}
          {dp!=null&&dp>=MIN&&dp<=MAX&&<div style={{position:"absolute",left:`${pct(dp)}%`,transform:"translateX(-50%) translateY(-100%)",top:"-2px",fontSize:"28px",filter:"drop-shadow(0 0 10px rgba(52,211,153,0.9))",transition:animar?"left 0.2s linear":"none"}} className={anda?"wk":""}>🐕</div>}
          {animar&&start!=null&&start>=MIN&&start<=MAX&&<div style={{position:"absolute",left:`${pct(start)}%`,transform:"translateX(-50%) translateY(-100%)",top:"-2px",fontSize:"15px",opacity:.4}}>📍</div>}
        </div>
      </div>
    </div>
  );
}

  const c={background:"rgba(255,255,255,0.07)",borderRadius:"18px",padding:"16px 18px",border:"1px solid rgba(255,255,255,0.08)"};

  if(item.t==="dica") return <div style={{background:"rgba(120,80,0,0.3)",border:"2px solid rgba(251,191,36,0.5)",borderRadius:"18px",padding:"16px 18px"}} className="up">{item.v.split('\n').map((l,i)=><p key={i} style={{color:"#FDE68A",fontSize:"19px",fontWeight:800,margin:i?"6px 0 0":0}}>{l}</p>)}</div>;

  if(item.t==="regra") return <div style={{background:"rgba(60,20,100,0.35)",border:"2px solid rgba(167,139,250,0.5)",borderRadius:"18px",padding:"16px 18px"}} className="up">{item.v.split('\n').map((l,i)=><p key={i} style={{color:"#DDD6FE",fontSize:"19px",fontWeight:800,margin:i?"6px 0 0":0}}>{l}</p>)}</div>;
  if(item.t==="bigRegra") return <div style={{background:"rgba(0,60,30,0.35)",border:"2px solid rgba(52,211,153,0.5)",borderRadius:"18px",padding:"18px",textAlign:"center"}} className="up pop"><p style={{color:"#6EE7B7",fontSize:"24px",fontWeight:900,margin:0,fontFamily:"monospace"}}>{item.v}</p></div>;

  if(item.t==="cards") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"10px"}}>{item.cards.map((cd,i)=><div key={i} style={{...c,display:"flex",alignItems:"flex-start",gap:"14px"}}><span style={{fontSize:"30px"}}>{cd.e}</span><div><p style={{color:"#fff",fontSize:"19px",fontWeight:900,margin:0}}>{cd.tit}</p><p style={{color:"#93C5FD",fontSize:"18px",fontWeight:700,margin:"2px 0 0"}}>{cd.ex}</p><p style={{color:"rgba(156,163,175,1)",fontSize:"17px",fontWeight:600,margin:"2px 0 0"}}>{cd.exp}</p></div></div>)}</div>;
  if(item.t==="modEx") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"12px"}}>{item.ns.map((n,i)=><div key={i} style={c}><p style={{color:"#FBBF24",fontSize:"21px",fontWeight:900,textAlign:"center",margin:"0 0 4px"}}>|{n}| = {Math.abs(n)}</p><Reta hl={n} dist/></div>)}</div>;
  if(item.t==="notacao") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"8px"}}>{item.ns.map((x,i)=><div key={i} style={c}><p style={{color:"#6EE7B7",fontSize:"21px",fontWeight:900,fontFamily:"monospace",margin:0}}>{x.e}</p><p style={{color:"rgba(156,163,175,1)",fontSize:"17px",fontWeight:600,margin:"4px 0 0"}}>{x.d}</p></div>)}</div>;
  if(item.t==="retaEx") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"12px"}}>{item.ex.map((x,i)=><div key={i}><p style={{color:"#6EE7B7",fontSize:"18px",fontWeight:700,margin:"0 0 6px",paddingLeft:"4px"}}>{x.desc}</p><Reta hl={x.n}/></div>)}</div>;
  if(item.t==="espelho") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"12px"}}>{item.pares.map((x,i)=><div key={i} style={c}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}><span style={{color:"#93C5FD",fontSize:"23px",fontWeight:900}}>{x.s}</span><span style={{color:"#FBBF24",fontSize:"17px",fontWeight:800}}>🪞 zero 🪞</span><span style={{color:"#FCA5A5",fontSize:"23px",fontWeight:900}}>+{x.n}</span></div><Reta hl={x.n}/></div>)}</div>;
  if(item.t==="passos") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"10px"}}>{item.ps.map((x,i)=><div key={i} style={c}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#93C5FD",fontSize:"18px",fontWeight:700}}>← {x.ant}</span><span style={{color:"#fff",fontSize:"26px",fontWeight:900}}>{x.n}</span><span style={{color:"#6EE7B7",fontSize:"18px",fontWeight:700}}>{x.suc} →</span></div>{x.nota&&<p style={{color:"#FDE68A",fontSize:"17px",fontWeight:800,margin:"6px 0 0"}}>{x.nota}</p>}</div>)}</div>;
  if(item.t==="direcao") return <div className="up" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>{item.ds.map((r,i)=><div key={i} style={{borderRadius:"18px",padding:"16px",textAlign:"center",border:`2px solid ${i===0?"rgba(52,211,153,0.4)":"rgba(248,113,113,0.4)"}`,background:i===0?"rgba(0,60,30,0.3)":"rgba(80,0,0,0.3)"}}><div style={{fontSize:"36px"}}>{r.em}</div><p style={{color:i===0?"#6EE7B7":"#FCA5A5",fontSize:"16px",fontWeight:800,margin:"8px 0 2px"}}>{r.sinal}</p><p style={{color:"#fff",fontSize:"20px",fontWeight:900,margin:0}}>{r.dir}</p></div>)}</div>;
  if(item.t==="exemploAnm") return <div style={c} className="up"><p style={{color:"#FBBF24",fontWeight:900,textAlign:"center",fontSize:"25px",margin:"0 0 14px",fontFamily:"monospace"}}>{item.expr}</p><div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"14px"}}>{item.passos.map((s,i)=><div key={i} style={{display:"flex",gap:"12px",alignItems:"flex-start"}}><span style={{color:"rgba(107,114,128,1)",fontSize:"16px",marginTop:"2px",minWidth:"22px",fontWeight:700}}>{i+1}.</span><span style={{color:"#E5E7EB",fontSize:"19px",fontWeight:700}}>{s}</span></div>)}</div>{item.nl&&<Reta start={item.nl.start} end={item.nl.end} animar={anm}/>}</div>;
  if(item.t==="regraBox") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"10px"}}>{item.rs.map((r,i)=><div key={i} style={c}><p style={{color:"#FBBF24",fontSize:"19px",fontWeight:900,margin:"0 0 4px"}}>{r.tit}</p><p style={{color:"#E5E7EB",fontSize:"18px",fontWeight:700,margin:"0 0 6px"}}>{r.reg}</p><p style={{color:"#6EE7B7",fontSize:"18px",fontFamily:"monospace",fontWeight:800,margin:0,whiteSpace:"pre-line"}}>{r.ex}</p></div>)}</div>;
  if(item.t==="subEx") return <div className="up" style={{display:"flex",flexDirection:"column",gap:"12px"}}>{item.ss.map((x,i)=><div key={i} style={c}><p style={{fontSize:"19px",fontWeight:900,margin:"0 0 6px"}}><span style={{color:"#FBBF24"}}>{x.o}</span><span style={{color:"rgba(107,114,128,1)"}}> = </span><span style={{color:"#93C5FD"}}>{x.tr}</span><span style={{color:"rgba(107,114,128,1)"}}> = </span><span style={{color:"#6EE7B7",fontWeight:900}}>{x.r}</span></p><Reta start={x.nl.start} end={x.nl.end}/></div>)}</div>;
  return null;
}

function App(){
  // Persistência de sessões — laudo: critério de avanço = estabilização, não "entendeu uma vez"
  const [storage,setStorage]=useState(()=>{
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||{blocos:{}}; }
    catch{ return {blocos:{}}; }
  });

  const [tela,setTela]=useState("home");
  const [bi,setBi]=useState(0);
  const [fase,setFase]=useState("slides");
  const [ri,setRi]=useState(0);
  const [si,setSi]=useState(0);
  const [qi,setQi]=useState(0);
  const [sel,setSel]=useState(null);
  const [tent,setTent]=useState(0);
  // retaVis: reta disponível ANTES do erro — laudo: suporte antecipado, não como punição
  const [retaVis,setRetaVis]=useState(false);
  const [rev,setRev]=useState(false);
  const [humor,setHumor]=useState("n");
  // log detalhado por questão — laudo: relatório rico para mediação externa da mãe
  const [log,setLog]=useState([]);

  const B=BLOCOS[bi]||BLOCOS[0];

  // Quantas sessões o Pedro completou neste bloco
  const getSessoes=id=>storage.blocos[id]?.sessoes||0;

  // Bloco desbloqueado quando o anterior tiver sessões suficientes
  const blocoDesbloqueado=i=>{
    if(i===0) return true;
    const prev=BLOCOS[i-1];
    return getSessoes(prev.id)>=prev.sessoesNecessarias;
  };

  // Salva sessão concluída no localStorage
  const salvarSessao=id=>{
    const n=(storage.blocos[id]?.sessoes||0)+1;
    const novo={...storage,blocos:{...storage.blocos,[id]:{sessoes:n,data:new Date().toLocaleDateString('pt-BR')}}};
    setStorage(novo);
    try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(novo)); }catch{}
    return n;
  };

  const rst=()=>{setSel(null);setTent(0);setRetaVis(false);setRev(false);};

  const avan=()=>{
    setHumor("n");rst();
    if(fase==="rev"){
      if(B.revisao&&ri<B.revisao.length-1) setRi(r=>r+1);
      else{ setFase("slides");setSi(0); }
    }else if(fase==="slides"){
      if(si<B.slides.length-1) setSi(s=>s+1);
      else{ setFase("qs");setQi(0); }
    }else{
      if(qi<B.questoes.length-1) setQi(q=>q+1);
      else{
        salvarSessao(B.id);
        setTela("sessao");
      }
    }
  };

  const iniciar=i=>{
    setBi(i);setTela("bloco");rst();setRi(0);setSi(0);setQi(0);setHumor("n");setLog([]);
    setFase(BLOCOS[i].revisao?"rev":"slides");
  };

  const pick=i=>{
    if(sel!=null||rev) return;
    const q=B.questoes[qi];
    const t=tent+1;
    setTent(t);
    setSel(i);
    if(i===q.ok){
      setHumor("f");
      // Rastreia se usou reta como apoio — laudo: não conta como erro, só informa a mãe
      const res=t===1?"ok":retaVis?"com_reta":"tentou";
      setLog(l=>[...l,{qi,ctx:q.ctx,perg:q.perg,res}]);
    }else{
      setHumor("c");
      if(t>=2){
        setRev(true);
        setLog(l=>[...l,{qi,ctx:q.ctx,perg:q.perg,res:"revelou"}]);
      }
    }
  };

  // Relatório rico — laudo: mãe precisa saber qual questão específica precisou de mediação
  const wa=tipo=>{
    let msg="";
    if(tipo==="rel"){
      const sessoes=getSessoes(B.id);
      const ok=log.filter(x=>x.res==="ok").length;
      const dc=log.filter(x=>x.res==="com_reta"||x.res==="tentou").length;
      const rv=log.filter(x=>x.res==="revelou").length;
      const det=log.map((x,idx)=>{
        const ic=x.res==="ok"?"✅":x.res==="revelou"?"⚠️":"💡";
        return `${ic} Q${idx+1}: ${x.ctx}`;
      }).join("\n");
      const revisar=log.filter(x=>x.res==="revelou");
      let rec="";
      if(rv===0) rec="🌟 Excelente! Pode avançar normalmente.";
      else if(rv===1) rec=`💬 Revisar oralmente com Pedro: Q${log.findIndex(x=>x.res==="revelou")+1} — ${revisar[0]?.ctx}`;
      else rec=`🔁 Recomendo repetir este bloco antes de avançar (${rv} questões precisaram da resposta)`;
      msg=`📊 *Pedro — ${B.emoji} ${B.titulo}*\n`+
          `Sessão ${sessoes} de ${B.sessoesNecessarias} | ${storage.blocos[B.id]?.data||"hoje"}\n\n`+
          `${det}\n\n`+
          `✅ Direto: ${ok}   💡 Com apoio: ${dc}   ⚠️ Revelou: ${rv}\n\n`+
          rec;
    }else{
      msg=`🐕 Oi mãe! Estou com dúvida no *${B.emoji} ${B.titulo}*. Pode me ajudar? 😊`;
    }
    window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`,"_blank");
  };

  const dog=humor==="f"?"bn":humor==="c"?"sh":"";
  const g0=B.grad[0],g1=B.grad[1];
  const btnP={width:"100%",padding:"20px",borderRadius:"22px",border:"none",cursor:"pointer",background:`linear-gradient(135deg,${g0},${g1})`,color:"#fff",fontSize:"20px",fontWeight:900,boxShadow:`0 6px 24px ${g0}66`};

  // Botão da mãe — grande, quente, sempre visível — laudo: raramente pede ajuda espontaneamente
  const BtnMae=({tipo="dv"})=>(
    <button onClick={()=>wa(tipo==="rel"?"rel":"dv")} className="gl"
      style={{width:"100%",padding:"20px",borderRadius:"22px",border:"none",cursor:"pointer",background:"linear-gradient(135deg,#B45309,#F59E0B)",color:"#1C1917",fontSize:"20px",fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",gap:"12px",boxShadow:"0 6px 26px rgba(245,158,11,0.45)"}}>
      ❤️ {tipo==="rel"?"Enviar resultado para a mãe":"Estou com dúvida — chamar a mãe"}
    </button>
  );

  // ─── TELA INICIAL ────────────────────────────────────────────────────────────
  if(tela==="home") return(
    <><style>{css}</style>
    <div style={{minHeight:"100vh",background:"#0B0F1A",color:"#fff",paddingBottom:"50px"}}>
      <div style={{textAlign:"center",padding:"50px 24px 28px"}}>
        <div style={{fontSize:"80px",filter:"drop-shadow(0 0 22px rgba(52,211,153,0.6))"}}>🐕</div>
        <h1 style={{fontSize:"28px",fontWeight:900,margin:"10px 0 6px"}}>Olá, Pedro!</h1>
        <p style={{color:"rgba(156,163,175,1)",fontSize:"19px",fontWeight:700,margin:0}}>O Sauron está aqui com você!</p>
      </div>
      <div style={{padding:"0 20px",display:"flex",flexDirection:"column",gap:"14px",maxWidth:"440px",margin:"0 auto"}}>
        {BLOCOS.map((b,i)=>{
          const desbloqueado=blocoDesbloqueado(i);
          const sessoes=getSessoes(b.id);
          const dominado=sessoes>=b.sessoesNecessarias;
          return(
            <button key={b.id} onClick={()=>desbloqueado&&iniciar(i)}
              style={{width:"100%",textAlign:"left",padding:"20px 22px",borderRadius:"24px",
                border:desbloqueado?"none":"1px solid rgba(255,255,255,0.08)",
                cursor:desbloqueado?"pointer":"not-allowed",
                background:desbloqueado?`linear-gradient(135deg,${b.grad[0]},${b.grad[1]})`:"rgba(255,255,255,0.05)",
                boxShadow:desbloqueado?`0 6px 24px ${b.grad[0]}44`:"none",
                opacity:desbloqueado?1:0.45}}>
              <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                <span style={{fontSize:"36px"}}>{desbloqueado?b.emoji:"🔒"}</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                    <p style={{fontWeight:900,color:desbloqueado?"#fff":"rgba(156,163,175,0.5)",fontSize:"19px",margin:0}}>{b.titulo}</p>
                    {dominado&&<span style={{background:"rgba(52,211,153,0.2)",color:"#6EE7B7",fontSize:"12px",fontWeight:900,padding:"2px 8px",borderRadius:"8px"}}>✅ dominado</span>}
                  </div>
                  <p style={{color:desbloqueado?"rgba(255,255,255,0.65)":"rgba(107,114,128,0.4)",fontSize:"17px",fontWeight:600,margin:"2px 0 0"}}>
                    {desbloqueado?b.desc:"Complete o bloco anterior primeiro"}
                  </p>
                  {/* Barra de progresso de sessões — laudo: Pedro precisa ver onde está */}
                  {desbloqueado&&!dominado&&(
                    <div style={{marginTop:"10px"}}>
                      <div style={{display:"flex",gap:"5px",marginBottom:"4px"}}>
                        {Array.from({length:b.sessoesNecessarias},(_,idx)=>(
                          <div key={idx} style={{flex:1,height:"5px",borderRadius:"3px",
                            background:idx<sessoes?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.2)"}}/>
                        ))}
                      </div>
                      <p style={{color:"rgba(255,255,255,0.5)",fontSize:"14px",fontWeight:700,margin:0}}>
                        {sessoes===0?`${b.sessoesNecessarias} sessões para dominar`:`${sessoes} de ${b.sessoesNecessarias} sessões`}
                      </p>
                    </div>
                  )}
                </div>
                <span style={{color:"rgba(255,255,255,0.4)",fontSize:"28px"}}>{desbloqueado?"›":"🔒"}</span>
              </div>
            </button>
          );
        })}
      </div>
    </div></>
  );

  // ─── TELA DE SESSÃO CONCLUÍDA ────────────────────────────────────────────────
  // Nova tela — laudo: Pedro precisa de feedback imediato, mãe precisa de relatório detalhado
  if(tela==="sessao"){
    const sessoesFeitasAgora=getSessoes(B.id);
    const dominado=sessoesFeitasAgora>=B.sessoesNecessarias;
    const ok=log.filter(x=>x.res==="ok").length;
    const dc=log.filter(x=>x.res==="com_reta"||x.res==="tentou").length;
    const rv=log.filter(x=>x.res==="revelou").length;
    const precisaRepetir=rv>=2;
    const proximoIndex=bi+1;
    const temProximo=proximoIndex<BLOCOS.length;
    return(
      <><style>{css}</style>
      <div style={{minHeight:"100vh",background:"#0B0F1A",color:"#fff",display:"flex",flexDirection:"column",alignItems:"center",padding:"40px 24px 50px",gap:"20px"}}>
        <div style={{fontSize:"80px"}} className="bn">🐕</div>

        <div style={{textAlign:"center"}}>
          <h2 style={{fontSize:"28px",fontWeight:900,color:"#FBBF24",margin:"0 0 8px"}}>
            {dominado&&!precisaRepetir?"Bloco dominado! 💪":"Sessão concluída!"}
          </h2>
          <p style={{color:"rgba(209,213,219,1)",fontSize:"18px",fontWeight:700,margin:0}}>
            {B.emoji} {B.titulo}
          </p>
        </div>

        {/* Barra de progresso de sessões */}
        <div style={{width:"100%",maxWidth:"400px"}}>
          <div style={{display:"flex",gap:"6px",marginBottom:"8px"}}>
            {Array.from({length:B.sessoesNecessarias},(_,idx)=>(
              <div key={idx} style={{flex:1,height:"10px",borderRadius:"5px",
                background:idx<sessoesFeitasAgora?`linear-gradient(90deg,${g0},${g1})`:"rgba(255,255,255,0.15)"}}/>
            ))}
          </div>
          <p style={{color:"rgba(156,163,175,1)",textAlign:"center",fontSize:"15px",fontWeight:700,margin:0}}>
            {dominado?`${B.sessoesNecessarias} sessões concluídas ✅`:`Sessão ${sessoesFeitasAgora} de ${B.sessoesNecessarias}`}
          </p>
        </div>

        {/* Resumo numérico */}
        <div style={{width:"100%",maxWidth:"400px",background:"rgba(255,255,255,0.05)",borderRadius:"20px",padding:"20px",border:"1px solid rgba(255,255,255,0.08)"}}>
          <p style={{color:"rgba(156,163,175,1)",fontSize:"15px",fontWeight:800,margin:"0 0 14px",textTransform:"uppercase",letterSpacing:".5px"}}>Resultado desta sessão</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",textAlign:"center"}}>
            <div style={{background:"rgba(52,211,153,0.1)",borderRadius:"14px",padding:"12px 6px"}}>
              <div style={{fontSize:"32px",fontWeight:900,color:"#6EE7B7"}}>{ok}</div>
              <div style={{fontSize:"13px",color:"rgba(156,163,175,1)",fontWeight:700,marginTop:"4px"}}>✅ Direto</div>
            </div>
            <div style={{background:"rgba(147,197,253,0.1)",borderRadius:"14px",padding:"12px 6px"}}>
              <div style={{fontSize:"32px",fontWeight:900,color:"#93C5FD"}}>{dc}</div>
              <div style={{fontSize:"13px",color:"rgba(156,163,175,1)",fontWeight:700,marginTop:"4px"}}>💡 Com apoio</div>
            </div>
            <div style={{background:"rgba(252,165,165,0.1)",borderRadius:"14px",padding:"12px 6px"}}>
              <div style={{fontSize:"32px",fontWeight:900,color:"#FCA5A5"}}>{rv}</div>
              <div style={{fontSize:"13px",color:"rgba(156,163,175,1)",fontWeight:700,marginTop:"4px"}}>⚠️ Revelou</div>
            </div>
          </div>
        </div>

        {/* Recomendação — laudo: Pedro não vê erro; mãe recebe via WhatsApp */}
        {precisaRepetir&&(
          <div style={{width:"100%",maxWidth:"400px",background:"rgba(120,80,0,0.3)",border:"2px solid rgba(251,191,36,0.5)",borderRadius:"18px",padding:"16px 18px"}}>
            <p style={{color:"#FDE68A",fontSize:"18px",fontWeight:800,margin:"0 0 4px"}}>🐕 Que tal repetir mais uma vez?</p>
            <p style={{color:"rgba(253,230,138,0.7)",fontSize:"16px",fontWeight:600,margin:0}}>Repetir ajuda a fixar melhor.</p>
          </div>
        )}

        {dominado&&!precisaRepetir&&temProximo&&(
          <div style={{width:"100%",maxWidth:"400px",background:"rgba(0,60,30,0.3)",border:"2px solid rgba(52,211,153,0.5)",borderRadius:"18px",padding:"16px 18px",textAlign:"center"}}>
            <p style={{color:"#6EE7B7",fontSize:"18px",fontWeight:800,margin:0}}>🔓 {BLOCOS[proximoIndex].emoji} {BLOCOS[proximoIndex].titulo} desbloqueado!</p>
          </div>
        )}

        <div style={{width:"100%",maxWidth:"400px",display:"flex",flexDirection:"column",gap:"12px"}}>
          {/* Botão da mãe com relatório detalhado — laudo: mediação externa essencial */}
          <BtnMae tipo="rel"/>
          <button onClick={()=>wa("dv")}
            style={{width:"100%",padding:"18px",borderRadius:"22px",border:"2px solid rgba(245,158,11,0.4)",background:"transparent",color:"#F59E0B",fontSize:"19px",fontWeight:800,cursor:"pointer"}}>
            🐕 Tenho uma dúvida
          </button>
          <button onClick={()=>iniciar(bi)}
            style={{width:"100%",padding:"18px",borderRadius:"22px",border:"2px solid rgba(255,255,255,0.12)",background:"transparent",color:"rgba(209,213,219,1)",fontSize:"19px",fontWeight:800,cursor:"pointer"}}>
            🔄 Repetir este bloco
          </button>
          {dominado&&temProximo&&!precisaRepetir&&(
            <button onClick={()=>iniciar(proximoIndex)} style={btnP}>
              Próximo bloco →
            </button>
          )}
          <button onClick={()=>setTela("home")}
            style={{width:"100%",padding:"18px",borderRadius:"22px",border:"none",background:"rgba(255,255,255,0.07)",color:"rgba(209,213,219,1)",fontSize:"19px",fontWeight:800,cursor:"pointer"}}>
            🏠 Início
          </button>
        </div>
      </div></>
    );
  }

  // ─── TELA DE BLOCO ────────────────────────────────────────────────────────────
  const q=fase==="qs"?B.questoes[qi]:null;
  const rv2=(fase==="rev"&&B.revisao)?B.revisao[ri]:null;
  const sl=fase==="slides"?B.slides[si]:null;
  const acertou=sel!=null&&q&&sel===q.ok;
  const sessaoAtual=getSessoes(B.id)+1;

  return(
    <><style>{css}</style>
    <div style={{minHeight:"100vh",background:"#0B0F1A",color:"#fff",paddingBottom:"36px"}}>

      {/* HEADER */}
      <div style={{padding:"18px 20px 22px",background:`linear-gradient(135deg,${g0},${g1})`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
          <button onClick={()=>setTela("home")} style={{color:"rgba(255,255,255,0.8)",fontSize:"18px",fontWeight:800,background:"none",border:"none",cursor:"pointer"}}>← Início</button>
          <div style={{textAlign:"center"}}>
            <p style={{color:"#fff",fontWeight:900,fontSize:"17px",margin:0}}>{B.emoji} {B.titulo}</p>
            {/* Indicador de sessão — laudo: Pedro sabe em que sessão está */}
            <p style={{color:"rgba(255,255,255,0.7)",fontSize:"13px",fontWeight:700,margin:"2px 0 0"}}>
              Sessão {Math.min(sessaoAtual,B.sessoesNecessarias)} de {B.sessoesNecessarias}
            </p>
          </div>
          {/* Botão da mãe no header — sempre visível — laudo: raramente pede ajuda */}
          <button onClick={()=>wa("dv")}
            style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"50%",width:"48px",height:"48px",fontSize:"22px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>❤️</button>
        </div>
        {fase==="qs"&&(
          <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
            {B.questoes.map((_,i)=><div key={i} style={{flex:1,height:"6px",borderRadius:"3px",background:i<=qi?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.25)",transition:"background 0.3s"}}/>)}
          </div>
        )}
        <div style={{textAlign:"center"}}>
          <span style={{fontSize:"56px",display:"inline-block"}} className={dog}>🐕</span>
        </div>
      </div>

      <div style={{padding:"22px 20px",maxWidth:"440px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"18px"}}>
        <p style={{textAlign:"center",color:"rgba(107,114,128,0.8)",fontSize:"17px",fontWeight:700,margin:0}}>
          {fase==="rev"&&"🔄 Revisão rápida antes de começar"}
          {fase==="slides"&&`📖 Aprendendo — parte ${si+1} de ${B.slides.length}`}
          {fase==="qs"&&`✏️ Praticando — questão ${qi+1} de ${B.questoes.length}`}
        </p>

        {/* REVISÃO */}
        {fase==="rev"&&rv2&&(
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            <div style={{background:"rgba(37,99,235,0.2)",border:"2px solid rgba(59,130,246,0.4)",borderRadius:"22px",padding:"20px 22px"}}>
              <p style={{color:"#93C5FD",fontSize:"17px",fontWeight:800,margin:"0 0 10px"}}>🔄 REVISÃO RÁPIDA</p>
              <p style={{color:"#fff",fontSize:"21px",fontWeight:900,margin:0,lineHeight:1.4}}>{rv2.perg}</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {rv2.ops.map((o,i)=>(
                <button key={i} onClick={()=>{
                  if(i===rv2.ok){setHumor("f");setTimeout(()=>{setHumor("n");avan();},900);}
                  else{setHumor("c");setTimeout(()=>setHumor("n"),900);}
                }} style={{width:"100%",textAlign:"left",padding:"18px 20px",borderRadius:"18px",border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.07)",color:"#E5E7EB",fontSize:"20px",fontWeight:700,cursor:"pointer"}}>{o}</button>
              ))}
            </div>
          </div>
        )}

        {/* SLIDES */}
        {fase==="slides"&&sl&&(
          <>
            <h2 style={{fontSize:"23px",fontWeight:900,color:"#FBBF24",margin:0,lineHeight:1.3}}>{sl.titulo}</h2>
            <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
              {sl.itens.map((it,i)=><Item key={i} item={it}/>)}
            </div>
            <button onClick={avan} style={btnP}>{si<B.slides.length-1?"Continuar →":"Vamos praticar! →"}</button>
          </>
        )}

        {/* QUESTÕES */}
        {fase==="qs"&&q&&(
          <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:"22px",padding:"20px 22px",border:"1px solid rgba(255,255,255,0.08)"}}>
              <p style={{color:"rgba(156,163,175,1)",fontSize:"17px",fontWeight:700,margin:"0 0 8px"}}>{q.ctx}</p>
              <p style={{color:"#fff",fontSize:"22px",fontWeight:900,margin:0,lineHeight:1.4}}>{q.perg}</p>
            </div>

            {/* RETA PROATIVA — disponível ANTES do erro — laudo: redução de carga inibitória */}
            {q.nl&&!retaVis&&sel===null&&(
              <button onClick={()=>setRetaVis(true)}
                style={{background:"rgba(255,255,255,0.04)",border:"1px dashed rgba(255,255,255,0.2)",borderRadius:"16px",padding:"13px 18px",color:"rgba(156,163,175,0.85)",fontSize:"17px",fontWeight:700,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"22px"}}>🐕</span>
                <span>Ver na reta numérica</span>
              </button>
            )}

            {/* Reta visível */}
            {q.nl&&(retaVis||rev)&&(
              <div style={{background:"rgba(255,255,255,0.07)",borderRadius:"20px",padding:"14px 18px",border:"2px solid rgba(251,191,36,0.4)"}} className="pop">
                <p style={{color:"#FBBF24",fontSize:"18px",fontWeight:800,margin:"0 0 6px"}}>🐕 O Sauron mostra na reta:</p>
                <Reta hl={q.nl.hl??null} start={q.nl.start??null} end={q.nl.end??null} dist={q.nl.dist??false} animar/>
              </div>
            )}

            {/* Opções de resposta */}
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {q.ops.map((o,i)=>{
                let bg="rgba(255,255,255,0.07)",br="1px solid rgba(255,255,255,0.09)",fc="#E5E7EB";
                if(sel===i&&acertou){bg="rgba(0,80,40,0.55)";br="2px solid #34D399";fc="#fff";}
                else if(sel===i&&!acertou){bg="rgba(80,0,0,0.45)";br="1px solid rgba(248,113,113,0.5)";fc="#fff";}
                else if(rev&&i===q.ok){bg="rgba(0,80,40,0.4)";br="2px solid rgba(52,211,153,0.5)";fc="#fff";}
                return <button key={i} onClick={()=>pick(i)} style={{width:"100%",textAlign:"left",padding:"18px 20px",borderRadius:"18px",border:br,background:bg,color:fc,fontSize:"20px",fontWeight:700,cursor:"pointer",transition:"all 0.2s"}}>{o}</button>;
              })}
            </div>

            {/* Feedback — laudo: nunca "errado"; reta como suporte, nunca punição */}
            {sel!=null&&(
              <div className="pop" style={{borderRadius:"22px",padding:"18px 20px",
                background:acertou?"rgba(0,80,40,0.5)":"rgba(255,255,255,0.07)",
                border:acertou?"2px solid rgba(52,211,153,0.5)":"1px solid rgba(255,255,255,0.09)"}}>
                {acertou?(
                  <>
                    <p style={{color:"#6EE7B7",fontWeight:900,fontSize:"21px",margin:"0 0 8px"}}>🎯 Isso aí!</p>
                    <p style={{color:"rgba(209,213,219,1)",fontSize:"18px",fontWeight:700,margin:0,lineHeight:1.5}}>{q.feed}</p>
                  </>
                ):rev?(
                  // Nunca "errado" — laudo: medo de errar, perfeccionismo
                  <>
                    <p style={{color:"#FBBF24",fontWeight:900,fontSize:"20px",margin:"0 0 8px"}}>🐕 Veja como fica:</p>
                    <p style={{color:"rgba(209,213,219,1)",fontSize:"18px",fontWeight:700,margin:0,lineHeight:1.5}}>{q.feed}</p>
                  </>
                ):(
                  <>
                    <p style={{color:"#FBBF24",fontSize:"20px",fontWeight:800,margin:"0 0 12px"}}>🤔 Tenta de novo:</p>
                    <div style={{display:"flex",gap:"12px",flexWrap:"wrap"}}>
                      {q.nl&&!retaVis&&(
                        <button onClick={()=>setRetaVis(true)} style={{color:"#93C5FD",fontSize:"18px",fontWeight:800,background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>
                          Ver na reta
                        </button>
                      )}
                      <button onClick={()=>setSel(null)} style={{background:"rgba(37,99,235,0.4)",color:"#fff",fontSize:"18px",fontWeight:800,padding:"10px 22px",borderRadius:"14px",border:"none",cursor:"pointer"}}>
                        Tentar de novo
                      </button>
                    </div>
                  </>
                )}
              </div>
            )}

            {(acertou||rev)&&(
              <button onClick={avan} style={btnP}>
                {qi<B.questoes.length-1?"Próxima questão →":"Concluir sessão 🏁"}
              </button>
            )}
          </div>
        )}

        {/* Botão da mãe — grande, sempre visível — laudo: raramente pede ajuda */}
        {fase!=="rev"&&<BtnMae tipo="dv"/>}
      </div>
    </div></>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
